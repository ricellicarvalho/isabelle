version: "3.8"

services:
  isabelle_app: # Serviço renomeado para evitar qualquer ambiguidade
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - uid=${APP_UID:-1000}
        - user=ricelli
    container_name: isabelle_app
    restart: always
    environment:
      - TZ=America/Araguaina
    volumes:
      - ./:/var/www
    ports:
      - "9004:9000"
      - "5174:5173"
    working_dir: /var/www
    networks:
      - network_isabelle

    healthcheck:
      test: ["CMD", "php", "artisan", "doctor"]
      interval: 30s
      timeout: 10s
      retries: 3

  isabelle_webserver:
    image: nginx:alpine
    container_name: isabelle_nginx
    restart: always
    ports:
      - "8006:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - isabelle_app
    networks:
      - network_isabelle

  isabelle_database:
    image: mysql:8.0
    container_name: isabelle_db # Nome exato conforme solicitado
    restart: always
    environment:
      TZ: America/Araguaina
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - network_isabelle

networks:
  network_isabelle:
    driver: bridge

volumes:
  dbdata:
