# =============================================================================
# docker-compose.yml — BASE
# Configuração comum a TODOS os ambientes (dev e prod).
# Não inclui banco de dados (em prod, MySQL é nativo no host).
# Para dev, o serviço `isabelle_database` é adicionado por docker-compose.override.yml.
# =============================================================================

services:
  isabelle_app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Vêm do .env (APP_UID/APP_GID/APP_USER). Defaults para dev em WSL.
        - uid=${APP_UID:-1000}
        - gid=${APP_GID:-1000}
        - user=${APP_USER:-ricelli}
    container_name: isabelle_app
    restart: unless-stopped
    environment:
      - TZ=America/Araguaina
    working_dir: /var/www
    networks:
      - network_isabelle
    healthcheck:
      test: ["CMD", "php", "artisan", "doctor"]
      interval: 30s
      timeout: 10s
      retries: 3

  isabelle_webserver:
    image: nginx:alpine
    container_name: isabelle_nginx
    restart: unless-stopped
    depends_on:
      - isabelle_app
    networks:
      - network_isabelle

networks:
  network_isabelle:
    driver: bridge
