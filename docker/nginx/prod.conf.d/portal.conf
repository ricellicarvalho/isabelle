# =============================================================================
# portal.institutoalvesneves.com.br — Portal do Cliente
# Atrás do reverse proxy do host (nginx no host termina TLS).
# =============================================================================

server {
    listen 80;
    server_name portal.institutoalvesneves.com.br;

    root  /var/www/public;
    index index.php index.html;

    client_max_body_size 50M;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass isabelle_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        fastcgi_param HTTPS                  on;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for   if_not_empty;

        # Buffers maiores para suportar cookies de sessão criptografados (Laravel)
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;

        include fastcgi_params;
    }

    location ~ /\.(ht|env|git) {
        deny all;
    }
}
