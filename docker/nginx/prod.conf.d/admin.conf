# =============================================================================
# admin.institutoalvesneves.com.br — Painel Administrativo
# =============================================================================

# HTTP → redireciona para HTTPS
server {
    listen 80;
    server_name admin.institutoalvesneves.com.br;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name admin.institutoalvesneves.com.br;

    ssl_certificate     /etc/letsencrypt/live/admin.institutoalvesneves.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.institutoalvesneves.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root  /var/www/public;
    index index.php index.html;

    client_max_body_size 50M;

    # Cabeçalhos de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass isabelle_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(ht|env|git) {
        deny all;
    }
}
